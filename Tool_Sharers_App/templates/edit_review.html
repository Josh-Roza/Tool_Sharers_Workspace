{% extends 'template.html' %}

{% block content %}
<div class="card">
    <h2>Edit Review</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Changes</button>
    </form>

    <hr>

    <p><a href="{% url 'view_profile' review.seller.user_id %}">Cancel</a></p>
</div>
{% endblock %}
