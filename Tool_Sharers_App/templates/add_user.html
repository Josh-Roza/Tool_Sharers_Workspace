{% extends 'template.html' %}

{% block content %}

<body>
    {% if success %}
        <p>Account created{% if added_user %} for {{ added_user.username }}{% endif %}.</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create Account</button>
    </form>
{% endblock %}
