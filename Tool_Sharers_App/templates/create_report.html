{% extends 'template.html' %}

{% block content %}
<div class="card">
    <h2>Report {{ reported_user.username }}</h2>

    <p class="muted">Please explain why you are reporting this user.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit Report</button>
    </form>

    <hr>

    <p><a href="{% url 'view_profile' reported_user.user_id %}">Cancel</a></p>
</div>
{% endblock %}
