    {% extends 'template.html' %}

    {% block content %}
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    
    <hr>
    <p>Don't have an account? <a href="{% url 'add_user' %}">Create one here</a>.</p>

    {% endblock %}
