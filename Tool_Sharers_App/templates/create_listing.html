<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Listing</title>
</head>
<body>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        {{ form.as_p }}

        <button type="submit">
            {% if edit_mode %}Save Changes{% else %}Post{% endif %}
        </button>
    </form>

    <hr>
    <p><a href="{% url 'home' %}">← Cancel and return to listings</a></p>

</body>
</html>
