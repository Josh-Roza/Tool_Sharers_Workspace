{% extends 'template.html' %}

{% block content %}
<h2>My listings</h2>
<ul>
    {% for listing in listings %}
    <p>
        {{ listing.title }}
    <form action="{% url 'edit_listing' listing.listing_id %}" method="post" style="display:inline;">
        {% csrf_token %}
        <button type="submit">Edit</button>
    </form>
    <form action="{% url 'delete_listing' listing.listing_id %}" method="post" style="display:inline;">
        {% csrf_token %}
        <button type="submit" onclick="return confirm('Really delete?')">Delete</button>
    </form>
    </p>
    {% empty %}
    <li>You haven't posted anything yet.</li>
    {% endfor %}
</ul>
{% endblock %}
