{% extends 'template.html' %}

{% block content %}
    <h2>Delete Account</h2>
    <p>Are you sure you want to delete your account? This cannot be undone.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete My Account</button>
    </form>

    <p><a href="{% url 'my_profile' %}">Cancel</a></p>
{% endblock %}
